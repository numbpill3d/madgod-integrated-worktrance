; MADGOD PlatformIO project template
; copy to your ESP32 project directory

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
  ; add your libraries here
  ; e.g. WiFi, ArduinoJson, etc.

build_flags =
  -DCORE_DEBUG_LEVEL=0
